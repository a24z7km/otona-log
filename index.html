<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>オトナログ</title>
<meta name="theme-color" content="#3D4E81">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" crossorigin="anonymous"></script>
<style>
  :root{
    --bg:#F7F6F2;
    --card:#FFFFFF;
    --ink:#2B2B33;
    --sub:#8A8A94;
    --line:#E8E6DF;
    --accent:#3D4E81;      /* 藍 */
    --accent-soft:#EAEDF5;
    --danger:#C0564F;
    --radius:16px;
    --c-sleep:#7C8DB5; --c-study:#5B9E8F; --c-work:#C98A5E; --c-class:#8B7BB5;
    --c-move:#9AA65C; --c-meal:#D98F9C; --c-house:#6FA8C9; --c-ex:#D9A441;
    --c-rest:#A8A29B; --c-read:#7BA37B;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:"Hiragino Maru Gothic ProN","BIZ UDGothic","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    background:var(--bg); color:var(--ink); font-size:15px; line-height:1.6;
    overscroll-behavior-y:contain;
  }
  button{min-width:44px;min-height:44px}
  #app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;position:relative}
  header{padding:14px 18px 8px;display:flex;align-items:baseline;gap:8px}
  header h1{font-size:19px;letter-spacing:.06em}
  header .date{font-size:12.5px;color:var(--sub)}
  main{flex:1;padding:0 14px 96px;overflow-y:auto}

  /* ---- bottom tabs ---- */
  nav{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:480px;background:var(--card);
    border-top:1px solid var(--line);display:flex;
    padding-bottom:env(safe-area-inset-bottom);z-index:20;
  }
  nav button{
    flex:1;background:none;border:none;padding:10px 0 8px;cursor:pointer;min-height:56px;
    font-family:inherit;font-size:11px;color:var(--sub);display:flex;flex-direction:column;align-items:center;gap:2px;
  }
  nav button .ico{font-size:20px;line-height:1}
  nav button.on{color:var(--accent);font-weight:700}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px}
  .sec-label{font-size:11.5px;color:var(--sub);letter-spacing:.12em;margin:14px 4px 8px}

  /* ---- record ---- */
  .now-card{background:var(--accent);color:#fff;border:none;text-align:center;padding:20px 16px}
  .now-card.idle{background:var(--card);color:var(--sub);border:1px dashed var(--line)}
  .now-card .nc-name{font-size:20px;font-weight:700;letter-spacing:.04em}
  .now-card .nc-time{font-size:34px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.03em;margin:2px 0}
  .now-card .nc-since{font-size:12px;opacity:.75}
  .now-card .nc-stop{
    margin-top:12px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.45);
    color:#fff;border-radius:99px;padding:7px 26px;font-family:inherit;font-size:14px;cursor:pointer;
  }
  .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .cat-btn{
    border:none;border-radius:var(--radius);padding:14px 6px 12px;cursor:pointer;font-family:inherit;
    display:flex;flex-direction:column;align-items:center;gap:3px;background:var(--card);
    border:1px solid var(--line);transition:transform .06s;min-height:92px;
  }
  .cat-btn:active{transform:scale(.95)}
  .cat-btn .emoji{font-size:24px;line-height:1.2}
  .cat-btn .nm{font-size:13px;font-weight:600}
  .cat-btn .tot{font-size:10.5px;color:var(--sub);font-variant-numeric:tabular-nums}
  .cat-btn.active{outline:2.5px solid var(--cat);outline-offset:-2.5px;background:color-mix(in srgb,var(--cat) 12%,#fff)}
  .cat-btn .dot{width:26px;height:4px;border-radius:2px;background:var(--cat);margin-top:2px}
  .cat-btn.add{
    color:var(--sub);border:1.5px dashed #D7D4CB;background:transparent;justify-content:center;
  }
  .cat-btn.add .emoji{font-size:25px;color:var(--sub);font-weight:700}
  .cat-btn.add .nm{color:var(--sub)}
  .home-summary{display:flex;gap:8px;flex-wrap:wrap;margin:-2px 0 12px}
  .sum-chip{flex:1;min-width:150px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 12px}
  .sum-chip .lbl{font-size:11px;color:var(--sub)}
  .sum-chip .val{font-size:15px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
  .health-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .health-btn{border:1px solid var(--line);border-radius:var(--radius);background:var(--card);padding:12px 6px;font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;min-height:76px}
  .health-btn .emoji{font-size:24px;line-height:1}
  .health-btn .nm{font-size:12.5px;font-weight:700;color:var(--ink)}

  /* ---- timeline ---- */
  .day-nav{display:flex;align-items:center;justify-content:space-between;margin:10px 2px 12px}
  .day-nav b{font-size:16px}
  .day-nav button{background:var(--card);border:1px solid var(--line);border-radius:10px;width:44px;height:44px;font-size:18px;cursor:pointer;color:var(--ink)}
  .date-center{display:flex;flex-direction:column;align-items:center;gap:4px}
  .date-center input{border:1px solid var(--line);border-radius:9px;background:var(--card);color:var(--ink);font-family:inherit;font-size:12px;padding:4px 8px}
  .tl-wrap{display:flex;gap:12px}
  .cal-lane{position:relative;width:22px;flex-shrink:0;background:rgba(61,78,129,.05);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .cal-blk{position:absolute;left:3px;right:3px;border-radius:4px;background:rgba(61,78,129,.20);border:1px solid rgba(61,78,129,.16)}
  .cal-all-day{font-size:9px;color:var(--accent);background:rgba(61,78,129,.10);border-radius:5px;padding:1px 3px;margin:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tl-band{position:relative;width:64px;flex-shrink:0;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .tl-hour{position:absolute;left:0;right:0;border-top:1px solid #F0EEE8;font-size:8.5px;color:#C4C2BB;padding-left:3px}
  .tl-blk{position:absolute;left:16px;right:4px;border-radius:4px;opacity:.92}
  .tl-dot{position:absolute;left:1px;transform:translateY(-50%);font-size:12px;line-height:1;text-shadow:0 1px 2px rgba(255,255,255,.9);z-index:2}
  .tl-now{position:absolute;left:0;right:0;border-top:2px solid var(--danger)}
  .tl-list{flex:1;min-width:0}
  .tl-item{display:flex;gap:10px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 12px;margin-bottom:8px;cursor:pointer;min-height:44px}
  .tl-item .bar{width:5px;align-self:stretch;border-radius:3px;flex-shrink:0}
  .tl-item .ti-main{flex:1;min-width:0}
  .tl-item .ti-name{font-size:14px;font-weight:600}
  .tl-item .ti-time{font-size:12px;color:var(--sub);font-variant-numeric:tabular-nums}
  .tl-item .ti-note{font-size:11.5px;color:var(--sub);margin-top:2px;white-space:pre-wrap;word-break:break-word}
  .tl-item .ti-dur{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--accent);flex-shrink:0}
  .week-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;margin-bottom:14px}
  .week-day{min-width:0;cursor:pointer}
  .week-head{text-align:center;font-size:10px;color:var(--sub);line-height:1.25;margin-bottom:4px}
  .week-band-wrap{display:flex;gap:2px;justify-content:center}
  .week-band{position:relative;height:360px;flex:1;min-width:0;background:var(--card);border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .week-band .tl-blk{left:20%;right:8%;border-radius:3px}
  .week-band .tl-dot{left:1px;font-size:10px}
  .week-cal{position:relative;width:8px;flex-shrink:0;background:rgba(61,78,129,.05);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .week-total{text-align:center;font-size:9.5px;color:var(--sub);font-variant-numeric:tabular-nums;margin-top:4px}
  .empty{color:var(--sub);text-align:center;padding:36px 0;font-size:13.5px}

  /* ---- analysis ---- */
  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:99px;padding:3px;margin:10px 0 14px}
  .seg button{flex:1;border:none;background:none;border-radius:99px;padding:7px 0;font-family:inherit;font-size:13.5px;color:var(--sub);cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff;font-weight:700}
  .stat-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .stat-row .sr-emoji{width:26px;text-align:center;font-size:17px;flex-shrink:0}
  .stat-row .sr-body{flex:1;min-width:0}
  .stat-row .sr-top{display:flex;justify-content:space-between;font-size:13px}
  .stat-row .sr-top b{font-variant-numeric:tabular-nums}
  .stat-row .sr-track{height:8px;background:#F0EEE8;border-radius:4px;margin-top:3px;overflow:hidden}
  .stat-row .sr-fill{height:100%;border-radius:4px}
  .week-chart{display:flex;gap:6px;align-items:flex-end;height:150px;margin-top:6px}
  .wc-col{flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:100%}
  .wc-stack{display:flex;flex-direction:column-reverse;border-radius:5px;overflow:hidden}
  .wc-water{background:linear-gradient(180deg,#6FA8C9,#9CC9DD);border-radius:5px 5px 0 0;min-height:1px}
  .wc-lbl{text-align:center;font-size:10.5px;color:var(--sub);margin-top:4px}
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px}
  .kpi .k-lbl{font-size:11px;color:var(--sub)}
  .kpi .k-val{font-size:21px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--accent)}
  .chart-title{font-size:12px;color:var(--sub);letter-spacing:.08em;margin-bottom:8px}
  .rhythm-svg{display:block;width:100%;height:auto;overflow:visible}
  .svg-axis{stroke:#E8E6DF;stroke-width:1}
  .svg-grid{stroke:#F0EEE8;stroke-width:1}
  .svg-label{fill:var(--sub);font-size:10px}
  .legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--sub)}
  .legend-dot{width:10px;height:10px;border-radius:50%}
  .stack-row{display:grid;grid-template-columns:42px 1fr 42px;gap:8px;align-items:center;margin:8px 0}
  .stack-name,.stack-total{font-size:11.5px;color:var(--sub);font-variant-numeric:tabular-nums}
  .stack-bar{height:18px;background:#F0EEE8;border-radius:9px;overflow:hidden;display:flex}
  .stack-seg{height:100%;min-width:1px}

  /* ---- settings ---- */
  .set-item{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--line)}
  .set-item:last-child{border-bottom:none}
  .set-item .se{font-size:19px;width:28px;text-align:center}
  .set-item .sn{flex:1;font-size:14.5px}
  .set-item .sc{width:16px;height:16px;border-radius:50%;flex-shrink:0}
  .set-item button{background:none;border:none;color:var(--sub);font-size:16px;cursor:pointer;padding:4px 8px;width:44px;height:44px}
  .set-select{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-family:inherit;font-size:14px;background:#fff;color:var(--ink);margin-top:6px}
  .btn{display:block;width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:12px;font-family:inherit;font-size:14.5px;font-weight:700;cursor:pointer;margin-top:8px}
  .btn.ghost{background:var(--card);color:var(--accent);border:1px solid var(--accent)}
  .btn.danger{background:var(--card);color:var(--danger);border:1px solid var(--danger)}

  /* ---- modal ---- */
  .modal-bg{position:fixed;inset:0;background:rgba(30,30,40,.45);z-index:30;display:flex;align-items:flex-end;justify-content:center}
  .modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:calc(100vh - 24px);max-height:calc(100dvh - 24px);overflow-y:auto;padding:20px 18px calc(20px + env(safe-area-inset-bottom))}
  .modal h3{font-size:16px;margin-bottom:14px}
  .fld{margin-bottom:12px}
  .fld label{display:block;font-size:12px;color:var(--sub);margin-bottom:4px}
  .fld input,.fld select{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-family:inherit;font-size:16px;background:#fff;color:var(--ink)}
  .fld-row{display:flex;gap:10px}
  .fld-row .fld{flex:1}
  .color-row{display:flex;gap:8px;flex-wrap:wrap}
  .color-row .cbtn{width:44px;height:44px;border-radius:50%;border:3px solid transparent;cursor:pointer}
  .color-row .cbtn.on{border-color:var(--ink)}
  .modal-acts{display:flex;gap:10px;margin-top:16px}
  .modal-acts .btn{margin-top:0}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;padding:9px 20px;border-radius:99px;z-index:40;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;display:flex;align-items:center;gap:12px}
  .toast.show{opacity:1}
  .toast.has-action{pointer-events:auto}
  .toast button{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:99px;padding:5px 10px;font-family:inherit;font-size:12px;cursor:pointer}
  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>
<div id="app">
  <header><h1>オトナログ</h1><span class="date" id="hdrDate"></span></header>
  <main id="main"></main>
  <nav id="nav"></nav>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================================================
   オトナログ — 大人版ぴよログ プロトタイプ
   データ構造:
     state = {
       categories:[{id,name,emoji,color}],
       entries:[{id,cat,start,end,note?}],  // end===null は進行中
       logs:[{id,type,time,value?,note?}],
       settings:{sleepCatId,restCatId}
     }
   ============================================================ */

const STORAGE_KEY = "otona_log_v1";
const DB_NAME = "otona_log_device_db";
const DB_STORE = "state";
const DB_STATE_KEY = "current";
const PALETTE = ["#7C8DB5","#5B9E8F","#C98A5E","#8B7BB5","#9AA65C","#D98F9C","#6FA8C9","#D9A441","#A8A29B","#7BA37B","#B56A6A","#5E8CC9"];
const FIREBASE_SDK_VERSION = "12.16.0";
const FIREBASE_CONFIG = {
  apiKey: "",
  authDomain: "",
  projectId: "",
  appId: ""
};

const DEFAULT_CATS = [
  {id:"sleep", name:"睡眠",     emoji:"😴", color:"#7C8DB5"},
  {id:"study", name:"研究・学習", emoji:"📚", color:"#5B9E8F"},
  {id:"work",  name:"仕事",     emoji:"💼", color:"#C98A5E"},
  {id:"class", name:"授業",     emoji:"🎓", color:"#8B7BB5"},
  {id:"move",  name:"移動",     emoji:"🚃", color:"#9AA65C"},
  {id:"meal",  name:"食事",     emoji:"🍚", color:"#D98F9C"},
  {id:"house", name:"家事",     emoji:"🧺", color:"#6FA8C9"},
  {id:"ex",    name:"運動",     emoji:"⚽", color:"#D9A441"},
  {id:"rest",  name:"休憩",     emoji:"☕", color:"#A8A29B"},
  {id:"read",  name:"読書",     emoji:"📖", color:"#7BA37B"},
];
const DEFAULT_SETTINGS = { sleepCatId:"sleep", restCatId:"rest", googleClientId:"" };
const HEALTH_TYPES = {
  pee:{emoji:"🚽", name:"小"},
  poo:{emoji:"💩", name:"大"},
  water:{emoji:"💧", name:"水分", unit:"ml", step:"10", min:"1"},
  caffeine:{emoji:"☕", name:"カフェイン", unit:"mg", step:"10", min:"1"},
  alcohol:{emoji:"🍺", name:"アルコール", unit:"g", step:"1", min:"0.1"},
  mood:{emoji:"😐", name:"気分", unit:"", step:"1", min:"1"},
  weight:{emoji:"⚖️", name:"体重", unit:"kg", step:"0.1", min:"1"}
};
const CAL_SCOPE = "https://www.googleapis.com/auth/calendar.readonly";

let state = { categories: cloneData(DEFAULT_CATS), entries: [], logs: [], settings: {...DEFAULT_SETTINGS} };
let tab = "rec";
let tlDate = dayStart(Date.now());   // タイムラインの表示日
let tlMode = "day";
let anaMode = "day";
let anaDate = dayStart(Date.now());  // 分析の基準日
let tickTimer = null;
let saveTimer = null;
let googleToken = null;
let googleTokenExpiresAt = 0;
let googleTokenClient = null;
let calendarEvents = [];
let calendarRange = null;
let calendarLoading = false;
let firebaseModules = null;
let cloudAuth = null;
let cloudDb = null;
let cloudUser = null;
let cloudReady = false;
let cloudBusy = false;
let cloudSaveTimer = null;
let cloudUnsubscribe = null;
let cloudApplying = false;

/* ---------------- storage (device local IndexedDB + localStorage fallback) ---------------- */
async function load(){
  try{
    const stored = await loadDeviceState();
    if(stored && stored.categories && stored.entries){
      state = normalizeState(stored);
    }else{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const d = JSON.parse(raw);
        if(d.categories && d.entries) state = normalizeState(d);
      }
    }
    state = normalizeState(state);
    persistState({silent:true});
  }catch(e){ console.error("load failed", e); }
}
function openDeviceDb(){
  return new Promise((resolve,reject)=>{
    if(!("indexedDB" in window)){ reject(new Error("IndexedDB unavailable")); return; }
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = ()=>{
      const db = req.result;
      if(!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE);
    };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error || new Error("IndexedDB open failed"));
  });
}
async function withDeviceStore(mode, fn){
  const db = await openDeviceDb();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(DB_STORE, mode);
    const store = tx.objectStore(DB_STORE);
    let result;
    tx.oncomplete = ()=>{ db.close(); resolve(result); };
    tx.onerror = ()=>{ db.close(); reject(tx.error || new Error("IndexedDB transaction failed")); };
    try{ result = fn(store); }
    catch(e){ db.close(); reject(e); }
  });
}
async function loadDeviceState(){
  try{
    return await withDeviceStore("readonly", store => new Promise((resolve,reject)=>{
      const req = store.get(DB_STATE_KEY);
      req.onsuccess = ()=>resolve(req.result || null);
      req.onerror = ()=>reject(req.error || new Error("IndexedDB read failed"));
    }));
  }catch(e){
    console.warn("device storage read failed", e);
    return null;
  }
}
async function saveDeviceState(data){
  await withDeviceStore("readwrite", store => {
    store.put(data, DB_STATE_KEY);
  });
}
function cloneData(value){
  if(typeof structuredClone === "function") return structuredClone(value);
  return JSON.parse(JSON.stringify(value));
}
function safeId(value, fallback=uid()){
  const s = String(value || "").trim();
  return /^[A-Za-z0-9_-]{1,80}$/.test(s) ? s : fallback;
}
function uniqueId(value, used){
  let id = safeId(value);
  while(used.has(id)) id = uid();
  used.add(id);
  return id;
}
function safeColor(value, fallback){
  const s = String(value || "").trim();
  return /^#[0-9a-fA-F]{6}$/.test(s) ? s : fallback;
}
function normalizeState(d){
  const catIdMap = new Map();
  const usedCatIds = new Set();
  let categories = Array.isArray(d?.categories) ? d.categories : cloneData(DEFAULT_CATS);
  categories = categories.map((c, i)=>{
    const id = uniqueId(c?.id, usedCatIds);
    if(c?.id && !catIdMap.has(String(c.id))) catIdMap.set(String(c.id), id);
    return {
      id,
      name: String(c?.name || "カテゴリ").trim().slice(0,40) || "カテゴリ",
      emoji: Array.from(String(c?.emoji || "⭐")).slice(0,4).join("") || "⭐",
      color: safeColor(c?.color, PALETTE[i % PALETTE.length])
    };
  });
  if(!categories.length) categories = cloneData(DEFAULT_CATS);

  const next = {
    categories,
    entries: Array.isArray(d?.entries) ? d.entries : [],
    logs: Array.isArray(d?.logs) ? d.logs : [],
    settings: {...DEFAULT_SETTINGS, ...(d?.settings || {})}
  };
  if("sleepCatId" in (d || {})) next.settings.sleepCatId = d.sleepCatId;
  if("restCatId" in (d || {})) next.settings.restCatId = d.restCatId;
  next.settings.sleepCatId = catIdMap.get(String(next.settings.sleepCatId)) || next.settings.sleepCatId;
  next.settings.restCatId = catIdMap.get(String(next.settings.restCatId)) || next.settings.restCatId;
  if(!next.categories.some(c=>c.id===next.settings.sleepCatId)) next.settings.sleepCatId = null;
  if(!next.categories.some(c=>c.id===next.settings.restCatId)) next.settings.restCatId = null;
  const usedEntryIds = new Set();
  next.entries = next.entries
    .filter(e=>e && Number.isFinite(Number(e.start)) && (e.end===null || Number.isFinite(Number(e.end))))
    .map(e=>{
      const start = Number(e.start);
      const end = e.end===null ? null : Number(e.end);
      const entry = {
        id: uniqueId(e.id, usedEntryIds),
        cat: catIdMap.get(String(e.cat)) || safeId(e.cat),
        start,
        end
      };
      if(typeof e.note === "string" && e.note.trim()) entry.note = e.note.trim().slice(0,100);
      return entry;
    })
    .filter(e=>e.end===null || e.end>e.start);
  const openEntries = next.entries.filter(e=>e.end===null).sort((a,b)=>b.start-a.start);
  if(openEntries.length > 1){
    const keepId = openEntries[0].id;
    const now = Date.now();
    next.entries.forEach(e=>{
      if(e.end===null && e.id!==keepId) e.end = Math.max(e.start + 60000, now);
    });
  }
  const usedLogIds = new Set();
  next.logs = next.logs
    .filter(l=>l && HEALTH_TYPES[l.type] && Number.isFinite(Number(l.time)))
    .map(l=>{
      const log = {id:uniqueId(l.id, usedLogIds), type:l.type, time:Number(l.time)};
      if(["water","caffeine"].includes(l.type)) log.value = Math.max(0, Math.round(Number(l.value) || 0));
      if(l.type==="alcohol") log.value = Math.max(0, Math.round((Number(l.value) || 0) * 10) / 10);
      if(l.type==="mood") log.value = Math.min(5, Math.max(1, Math.round(Number(l.value) || 0)));
      if(l.type==="weight") log.value = Math.max(0, Math.round((Number(l.value) || 0) * 10) / 10);
      if(typeof l.note === "string" && l.note) log.note = l.note;
      return log;
    })
    .filter(l=>!["water","caffeine","alcohol","mood","weight"].includes(l.type) || l.value > 0);
  return next;
}
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    saveTimer = null;
    persistState();
  }, 400);
}
function persistState(opts={}){
  if(!opts.noTouch){
    state.settings = state.settings || {};
    state.settings.updatedAt = Date.now();
  }
  let localOk = true;
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){
    localOk = false;
  }
  saveDeviceState(cloneData(state)).catch(e=>{
    console.warn("device storage save failed", e);
    if(!opts.silent) toast(localOk ? "端末内DBへの保存に失敗しました" : "保存に失敗しました");
  });
  if(!opts.skipCloud && cloudUser && !cloudApplying) scheduleCloudSave();
  if(!localOk && !opts.silent) toast("保存に失敗しました");
  return localOk;
}
function flushSave(){
  if(saveTimer){
    clearTimeout(saveTimer);
    saveTimer = null;
    persistState();
  }
}

/* ---------------- cloud sync (Firebase Auth + Firestore) ---------------- */
function firebaseConfigured(){
  return ["apiKey","authDomain","projectId","appId"].every(k=>String(FIREBASE_CONFIG[k] || "").trim());
}
async function loadFirebaseModules(){
  if(firebaseModules) return firebaseModules;
  const base = `https://www.gstatic.com/firebasejs/${FIREBASE_SDK_VERSION}`;
  const [app, auth, firestore] = await Promise.all([
    import(`${base}/firebase-app.js`),
    import(`${base}/firebase-auth.js`),
    import(`${base}/firebase-firestore.js`)
  ]);
  firebaseModules = {app, auth, firestore};
  return firebaseModules;
}
async function initCloud(opts={}){
  if(!firebaseConfigured()){
    if(!opts.silent) toast("Firebase設定が未設定です");
    return false;
  }
  if(cloudReady) return true;
  try{
    const mods = await loadFirebaseModules();
    const app = mods.app.getApps().length ? mods.app.getApps()[0] : mods.app.initializeApp(FIREBASE_CONFIG);
    cloudAuth = mods.auth.getAuth(app);
    cloudAuth.useDeviceLanguage?.();
    cloudDb = mods.firestore.getFirestore(app);
    mods.auth.onAuthStateChanged(cloudAuth, async user=>{
      cloudUser = user || null;
      if(user){
        await syncCloudOnLogin();
        subscribeCloud();
      }else{
        if(cloudUnsubscribe){ cloudUnsubscribe(); cloudUnsubscribe = null; }
      }
      if(tab==="set") render();
    });
    cloudReady = true;
    return true;
  }catch(e){
    console.warn("cloud init failed", e);
    if(!opts.silent) toast("ログイン機能を初期化できませんでした");
    return false;
  }
}
function cloudDocRef(){
  if(!cloudUser || !cloudDb || !firebaseModules) return null;
  return firebaseModules.firestore.doc(cloudDb, "users", cloudUser.uid, "otonaLog", "state");
}
function localUpdatedAt(){ return Number(state.settings?.updatedAt || 0); }
function cloudPayload(){
  const data = exportState({activity:true, health:true});
  data.settings = data.settings || {};
  data.settings.updatedAt = data.settings.updatedAt || Date.now();
  return {data, updatedAt:Number(data.settings.updatedAt || Date.now()), schema:"otona_log_v1"};
}
function scheduleCloudSave(){
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(()=>saveCloudState(), 900);
}
async function saveCloudState(){
  const ref = cloudDocRef();
  if(!ref || cloudBusy) return;
  cloudBusy = true;
  try{
    await writeCloudState();
    if(tab==="set") render();
  }catch(e){
    console.warn("cloud save failed", e);
    toast("クラウド同期に失敗しました");
  }finally{
    cloudBusy = false;
  }
}
async function writeCloudState(){
  const ref = cloudDocRef();
  if(!ref) return;
  await firebaseModules.firestore.setDoc(ref, cloudPayload(), {merge:true});
}
function applyCloudState(data){
  cloudApplying = true;
  state = normalizeState(data);
  persistState({silent:true, skipCloud:true, noTouch:true});
  cloudApplying = false;
  render();
}
function remotePayloadFromSnap(snap){
  if(!snap?.exists?.()) return null;
  const payload = snap.data();
  return payload?.data ? payload : null;
}
async function syncCloudOnLogin(){
  const ref = cloudDocRef();
  if(!ref || cloudBusy) return;
  cloudBusy = true;
  try{
    const snap = await firebaseModules.firestore.getDoc(ref);
    const remote = remotePayloadFromSnap(snap);
    if(!remote){
      await writeCloudState();
      toast("この端末のデータをクラウドに保存しました");
      return;
    }
    const remoteState = normalizeState(remote.data);
    const remoteAt = Number(remote.updatedAt || remoteState.settings?.updatedAt || 0);
    const localAt = localUpdatedAt();
    const localHasData = state.entries.length || state.logs.length;
    if(!localHasData || remoteAt > localAt){
      const loadRemote = !localHasData || confirm("クラウドのデータがこの端末より新しいです。この端末に読み込みますか?\nキャンセルすると、この端末のデータでクラウドを上書きします。");
      if(loadRemote){
        applyCloudState(remoteState);
        toast("クラウドのデータを読み込みました");
      }else{
        await writeCloudState();
      }
    }else if(localAt > remoteAt){
      const uploadLocal = confirm("この端末のデータがクラウドより新しいです。クラウドへ保存しますか?\nキャンセルすると、クラウドのデータをこの端末に読み込みます。");
      if(uploadLocal) await writeCloudState();
      else{
        applyCloudState(remoteState);
        toast("クラウドのデータを読み込みました");
      }
    }
  }catch(e){
    console.warn("cloud sync failed", e);
    toast("クラウド同期に失敗しました");
  }finally{
    cloudBusy = false;
  }
}
function subscribeCloud(){
  const ref = cloudDocRef();
  if(!ref || cloudUnsubscribe) return;
  cloudUnsubscribe = firebaseModules.firestore.onSnapshot(ref, snap=>{
    const remote = remotePayloadFromSnap(snap);
    if(!remote || cloudApplying || cloudBusy) return;
    const remoteState = normalizeState(remote.data);
    const remoteAt = Number(remote.updatedAt || remoteState.settings?.updatedAt || 0);
    if(remoteAt > localUpdatedAt()){
      applyCloudState(remoteState);
      toast("別端末の更新を反映しました");
    }
  }, e=>console.warn("cloud watch failed", e));
}
async function loginCloud(){
  if(!(await initCloud())) return;
  try{
    const provider = new firebaseModules.auth.GoogleAuthProvider();
    await firebaseModules.auth.signInWithPopup(cloudAuth, provider);
  }catch(e){
    console.warn("popup login failed", e);
    try{
      const provider = new firebaseModules.auth.GoogleAuthProvider();
      await firebaseModules.auth.signInWithRedirect(cloudAuth, provider);
    }catch(err){
      console.warn("redirect login failed", err);
      toast("ログインを開始できませんでした");
    }
  }
}
async function logoutCloud(){
  if(!cloudAuth && !(await initCloud({silent:true}))) return;
  await firebaseModules.auth.signOut(cloudAuth);
  cloudUser = null;
  if(cloudUnsubscribe){ cloudUnsubscribe(); cloudUnsubscribe = null; }
  render(); toast("ログアウトしました");
}
async function syncCloudNow(){
  if(!cloudUser){ toast("ログインしてください"); return; }
  await saveCloudState();
  toast("クラウドへ同期しました");
}

/* ---------------- utils ---------------- */
function dayStart(t){ const d=new Date(t); d.setHours(0,0,0,0); return d.getTime(); }
function fmtYMD(t){ const d=new Date(t); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function fmtHM(t){ const d=new Date(t); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
function fmtDur(ms){
  const m = Math.floor(ms/60000);
  if(m < 60) return m + "分";
  return Math.floor(m/60) + "時間" + (m%60 ? String(m%60)+"分" : "");
}
function fmtDurShort(ms){
  const m = Math.round(ms/60000);
  return Math.floor(m/60) + ":" + String(m%60).padStart(2,"0");
}
function fmtDateJ(t){
  const d=new Date(t), w="日月火水木金土"[d.getDay()];
  return (d.getMonth()+1)+"/"+d.getDate()+"("+w+")";
}
function cat(id){ return state.categories.find(c=>c.id===id) || {name:"不明",emoji:"❓",color:"#999",id}; }
function ongoing(){ return state.entries.find(e=>e.end===null) || null; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return String(s).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }

/* 指定日の中でエントリが占める区間 [s,e] を返す(日跨ぎはクリップ) */
function clipToDay(e, day){
  const ds=day, de=day+86400000;
  const end = e.end===null ? Date.now() : e.end;
  const s = Math.max(e.start, ds), x = Math.min(end, de);
  return x > s ? [s,x] : null;
}
function entriesOfDay(day){
  return state.entries
    .map(e=>{ const c=clipToDay(e,day); return c ? {e, s:c[0], x:c[1]} : null; })
    .filter(Boolean).sort((a,b)=>a.s-b.s);
}
function totalsOfDay(day){
  const t={};
  for(const {e,s,x} of entriesOfDay(day)) t[e.cat]=(t[e.cat]||0)+(x-s);
  return t;
}
function logsOfDay(day){
  const ds=day, de=day+86400000;
  return state.logs.filter(l=>l.time>=ds && l.time<de).sort((a,b)=>a.time-b.time);
}
function healthName(type){ return HEALTH_TYPES[type]?.name || "不明"; }
function healthEmoji(type){ return HEALTH_TYPES[type]?.emoji || "•"; }
function healthUnit(type){ return HEALTH_TYPES[type]?.unit || ""; }
function healthValueText(l){
  if(!("value" in l)) return "";
  if(l.type==="mood") return moodEmoji(l.value) + String(l.value);
  const unit = healthUnit(l.type);
  return unit ? `${l.value}${unit}` : String(l.value);
}
function moodEmoji(v){ return ({1:"😩",2:"😕",3:"😐",4:"🙂",5:"😄"})[Math.round(Number(v))] || "😐"; }
function latestWeight(before=Infinity){
  return state.logs
    .filter(l=>l.type==="weight" && Number.isFinite(Number(l.value)) && l.time<=before)
    .sort((a,b)=>b.time-a.time)[0] || null;
}
function healthSummaryOfDay(day){
  const t={pee:0, poo:0, water:0, caffeine:0, alcohol:0, moodSum:0, moodCount:0, weight:null};
  logsOfDay(day).forEach(l=>{
    if(l.type==="water") t.water += Number(l.value || 0);
    else if(l.type==="caffeine") t.caffeine += Number(l.value || 0);
    else if(l.type==="alcohol") t.alcohol += Number(l.value || 0);
    else if(l.type==="mood"){ t.moodSum += Number(l.value || 0); t.moodCount++; }
    else if(l.type==="weight") t.weight = Number(l.value || 0);
    else if(l.type in t) t[l.type]++;
  });
  return t;
}
function healthSummaryOfDays(days){
  return days.map(healthSummaryOfDay).reduce((a,b)=>({
    pee:a.pee+b.pee,
    poo:a.poo+b.poo,
    water:a.water+b.water,
    caffeine:a.caffeine+b.caffeine,
    alcohol:a.alcohol+b.alcohol,
    moodSum:a.moodSum+b.moodSum,
    moodCount:a.moodCount+b.moodCount,
    weight:b.weight ?? a.weight
  }), {pee:0,poo:0,water:0,caffeine:0,alcohol:0,moodSum:0,moodCount:0,weight:null});
}
function settingCatId(key){ return state.settings?.[key] || null; }
function latestEndedToday(catId, day){
  if(!catId) return null;
  return state.entries
    .filter(e=>e.cat===catId && e.end!==null && dayStart(e.end)===day)
    .reduce((latest,e)=>Math.max(latest, e.end), 0) || null;
}
function summaryHtml(){
  const today = dayStart(Date.now());
  const sleepEnd = latestEndedToday(settingCatId("sleepCatId"), today);
  const restEnd = latestEndedToday(settingCatId("restCatId"), today);
  const items = [];
  if(sleepEnd) items.push(`<div class="sum-chip"><div class="lbl">起床から</div><div class="val" id="wakeSince" data-time="${sleepEnd}"></div></div>`);
  if(restEnd) items.push(`<div class="sum-chip"><div class="lbl">前回の休憩から</div><div class="val" id="restSince" data-time="${restEnd}"></div></div>`);
  return items.length ? `<div class="home-summary">${items.join("")}</div>` : "";
}
function updateSummary(){
  [["wakeSince","起床から"],["restSince","前回の休憩から"]].forEach(([id])=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.textContent = fmtDur(Date.now() - Number(el.dataset.time));
  });
}
function dayRangeForTimeline(){
  if(tlMode==="week"){
    const endDay = Math.min(tlDate, dayStart(Date.now()));
    return {start:endDay-6*86400000, end:endDay+86400000};
  }
  return {start:tlDate, end:tlDate+86400000};
}
function calendarConnected(){ return Boolean(googleToken && Date.now() < googleTokenExpiresAt); }
function eventsOfDay(day){
  if(!calendarConnected()) return [];
  const ds=day, de=day+86400000;
  return calendarEvents.filter(ev=>{
    const s = ev.startMs ?? ds, e = ev.endMs ?? de;
    return e>ds && s<de;
  });
}
function calendarBlocks(day, compact=false){
  const evs = eventsOfDay(day);
  if(!evs.length) return "";
  return evs.map(ev=>{
    if(ev.allDay) return compact ? "" : `<div class="cal-all-day" title="${esc(ev.summary)}">${esc(ev.summary)}</div>`;
    const c = clipToDay({start:ev.startMs,end:ev.endMs}, day);
    if(!c) return "";
    const [s,x] = c;
    const top=(s-day)/86400000*100, hgt=Math.max((x-s)/86400000*100, compact ? .6 : 1);
    return `<div class="cal-blk" title="${esc(ev.summary)}" style="top:${top}%;height:${hgt}%"></div>`;
  }).join("");
}

/* ---------------- actions ---------------- */
function startCat(catId){
  const now = Date.now();
  const cur = ongoing();
  if(cur && cur.cat === catId){          // 同じボタン → 停止
    cur.end = now; save(); render();
    toast(cat(catId).name + " を終了"); return;
  }
  if(cur) cur.end = now;                 // 前の行動を閉じる
  state.entries.push({id:uid(), cat:catId, start:now, end:null});
  save(); render();
  toast(cat(catId).name + " を開始");
}
function startCatAt(catId, start){
  const now = Date.now();
  if(isNaN(start) || start > now){ toast("未来の時刻は指定できません"); return; }
  const cur = ongoing();
  if(cur && start <= cur.start){ toast("前の記録の開始より後を選んでください"); return; }
  if(cur) cur.end = start;
  state.entries.push({id:uid(), cat:catId, start, end:null});
  save(); closeModal(); render();
  toast(cat(catId).name + " を開始");
}
function stopCurrent(){
  const cur = ongoing();
  if(cur){
    cur.end = Date.now();
    const id = cur.id;
    save(); render();
    toast("記録を停止", "メモを追加", ()=>openNoteEdit(id));
  }
}
function deleteEntry(id){
  state.entries = state.entries.filter(e=>e.id!==id);
  save(); render();
}
function addHealthLog(type, value=null){
  const log = {id:uid(), type, time:Date.now()};
  if(["water","caffeine"].includes(type)) log.value = Math.max(0, Math.round(Number(value) || 0));
  if(type==="alcohol") log.value = Math.max(0, Math.round((Number(value) || 0) * 10) / 10);
  if(type==="mood") log.value = Math.min(5, Math.max(1, Math.round(Number(value) || 0)));
  if(type==="weight") log.value = Math.max(0, Math.round((Number(value) || 0) * 10) / 10);
  if(["water","caffeine","alcohol","mood","weight"].includes(type) && !log.value){ toast(`${healthName(type)}の値を入力してください`); return false; }
  state.logs.push(log);
  save(); render();
  toast(healthValueText(log) ? `${healthName(type)} ${healthValueText(log)} を記録` : `${healthName(type)}を記録`);
  return true;
}

function loadGisScript(){
  return new Promise((resolve,reject)=>{
    if(window.google?.accounts?.oauth2){ resolve(); return; }
    const existing = document.querySelector("script[data-gis]");
    if(existing){ existing.addEventListener("load", resolve, {once:true}); existing.addEventListener("error", reject, {once:true}); return; }
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.async = true; s.defer = true; s.dataset.gis = "1";
    s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}
async function connectCalendar(){
  const clientId = (state.settings.googleClientId || "").trim();
  if(!clientId){ toast("クライアントIDを入力してください"); return; }
  try{
    await loadGisScript();
    googleTokenClient = google.accounts.oauth2.initTokenClient({
      client_id: clientId,
      scope: CAL_SCOPE,
      callback: async res=>{
        if(res?.access_token){
          googleToken = res.access_token;
          googleTokenExpiresAt = Date.now() + Math.max(0, Number(res.expires_in || 3600) - 60) * 1000;
          toast("Googleカレンダーに接続しました");
          await refreshCalendarForCurrentView(true);
          render();
        }else{
          toast("Google連携に失敗しました");
        }
      }
    });
    googleTokenClient.requestAccessToken({prompt:"consent"});
  }catch(e){
    console.warn("calendar connect failed", e);
    toast("Google連携を開始できませんでした");
  }
}
function disconnectCalendar(){
  googleToken = null; googleTokenExpiresAt = 0; googleTokenClient = null;
  calendarEvents = []; calendarRange = null;
  render(); toast("Google連携を解除しました");
}
async function refreshCalendarForCurrentView(force=false){
  const range = dayRangeForTimeline();
  await loadCalendarEvents(range.start, range.end, force);
}
async function loadCalendarEvents(start, end, force=false){
  if(!calendarConnected() || calendarLoading || navigator.onLine===false) return;
  if(!force && calendarRange && calendarRange.start<=start && calendarRange.end>=end) return;
  calendarLoading = true;
  try{
    const url = "https://www.googleapis.com/calendar/v3/calendars/primary/events"
      + `?singleEvents=true&orderBy=startTime&maxResults=250&timeMin=${encodeURIComponent(new Date(start).toISOString())}&timeMax=${encodeURIComponent(new Date(end).toISOString())}`;
    const res = await fetch(url, {headers:{Authorization:`Bearer ${googleToken}`}});
    if(res.status===401 || res.status===403){
      googleToken = null; googleTokenExpiresAt = 0; calendarEvents = []; calendarRange = null;
      return;
    }
    if(!res.ok) return;
    const data = await res.json();
    calendarEvents = (data.items || []).map(ev=>{
      const allDay = Boolean(ev.start?.date);
      const s = ev.start?.dateTime ? new Date(ev.start.dateTime).getTime() : new Date(ev.start?.date + "T00:00:00").getTime();
      const e = ev.end?.dateTime ? new Date(ev.end.dateTime).getTime() : new Date(ev.end?.date + "T00:00:00").getTime();
      return {id:ev.id, summary:ev.summary || "(無題)", startMs:s, endMs:e, allDay};
    }).filter(ev=>Number.isFinite(ev.startMs) && Number.isFinite(ev.endMs));
    calendarRange = {start,end};
  }catch(e){
    console.warn("calendar fetch failed", e);
  }finally{
    calendarLoading = false;
  }
}
function scheduleCalendarRefresh(){
  if(tab!=="tl" || !calendarConnected()) return;
  const range = dayRangeForTimeline();
  if(calendarRange && calendarRange.start<=range.start && calendarRange.end>=range.end) return;
  loadCalendarEvents(range.start, range.end).then(()=>{ if(tab==="tl") render(); }).catch(()=>{});
}

let pressTimer = null;
let pressCatId = null;
let suppressClickUntil = 0;
let ignoreMouseUntil = 0;
function pressCatStart(ev, catId){
  if(ev.type==="touchstart") ignoreMouseUntil = Date.now() + 900;
  if(ev.type==="mousedown" && Date.now() < ignoreMouseUntil) return;
  if(ev.type==="mousedown" && ev.button!==0) return;
  clearTimeout(pressTimer);
  pressCatId = catId;
  pressTimer = setTimeout(()=>{
    suppressClickUntil = Date.now() + 800;
    openStartAdjust(catId);
  }, 500);
}
function pressCatEnd(){
  clearTimeout(pressTimer);
  pressTimer = null;
  pressCatId = null;
}
function catTap(ev, catId){
  if(Date.now() < suppressClickUntil || pressCatId===catId){
    ev.preventDefault(); ev.stopPropagation(); pressCatEnd();
    return false;

  startCat(catId);
  return true;
}

function setTlMode(mode){ tlMode=mode; clampTlDate(); render(); }
function shiftDay(n){ tlDate += n*86400000; clampTlDate(); render(); }
function shiftTlWeek(n){ tlDate += n*7*86400000; clampTlDate(); render(); }
function setTlDate(value){

function tlWeekDays(){
  const days=[]; for(let i=6;i>=0;i--) days.push(tlDate - i*86400000);

}
function tlWeekLabel(today){

function renderTimelineBand(day, compact=false){
  const isToday = day === dayStart(Date.now());
  let band = "";
  for(let h=0; h<24; h++) band += `<div class="tl-hour" style="top:${h/24*100}%">${compact && h%6!==0 ? "" : h}</div>`;
  for(const {e,s,x} of entriesOfDay(day)){
    const top=(s-day)/86400000*100, hgt=Math.max((x-s)/86400000*100, compact ? .6 : .45);
    band += `<div class="tl-blk" style="top:${top}%;height:${hgt}%;background:${cat(e.cat).color}" title="${esc(cat(e.cat).name)}"></div>`;
  }
  for(const l of logsOfDay(day)){
    const top=(l.time-day)/86400000*100;
    band += `<div class="tl-dot" style="top:${top}%" title="${esc(healthName(l.type))}${healthValueText(l)?` ${esc(healthValueText(l))}`:""}">${healthEmoji(l.type)}</div>`;
  }
  if(isToday) band += `<div class="tl-now" style="top:${(Date.now()-day)/86400000*100}%"></div>`;
  return band;
}
function renderTLDay(){
  const list = entriesOfDay(tlDate);

  const rows = [

        </div>

        <div class="ti-time">${fmtHM(s)} 〜 ${e.end===null?"":fmtHM(x)}</div>

      </div>

/* ---- 分析タブ ---- */
function setAnaMode(mode){ anaMode=mode; clampAnaDate(); render(); }
function clampAnaDate(){
  const today = dayStart(Date.now());
  if(anaDate > today) anaDate = today;
}
function anaStepDays(){
  if(anaMode==="week") return 7;
  if(anaMode==="rhythm") return 14;
  return 1;
}
function shiftAnaPeriod(n){
  clampAnaDate();
  anaDate += n * anaStepDays() * 86400000;
  clampAnaDate();
  render();
}
function setAnaDate(value){
  const t = new Date(value + "T00:00:00").getTime();
  if(isNaN(t)){ toast("日付が不正です"); return; }
  anaDate = dayStart(t);
  clampAnaDate();
  render();
}
function anaDays(count){
  const days = [];
  for(let i=count-1;i>=0;i--) days.push(anaDate - i*86400000);
  return days;
}
function anaPeriodLabel(today){
  if(anaMode==="day") return `${fmtDateJ(anaDate)}${anaDate===today?" (今日)":""}`;
  const span = anaMode==="week" ? 7 : 14;
  const start = anaDate - (span - 1) * 86400000;
  return `${fmtDateJ(start)} 〜 ${fmtDateJ(anaDate)}${anaDate===today?"":""}`;
}
function anaNavHtml(today){
  const atToday = anaDate >= today;
  return `<div class="day-nav ana-nav">
    <button onclick="shiftAnaPeriod(-1)">‹</button>
    <div class="date-center">
      <b>${anaPeriodLabel(today)}</b>
      <input type="date" value="${fmtYMD(anaDate)}" max="${fmtYMD(today)}" onchange="setAnaDate(this.value)">
    </div>
    <button onclick="shiftAnaPeriod(1)" ${atToday?"disabled style='opacity:.3'":""}>›</button>
  </div>`;
}
function renderAna(m){
  const today = dayStart(Date.now());
  clampAnaDate();
  let html = `<div class="seg">
    <button class="${anaMode==='day'?'on':''}" onclick="setAnaMode('day')">日別</button>
    <button class="${anaMode==='week'?'on':''}" onclick="setAnaMode('week')">7日間</button>
    <button class="${anaMode==='rhythm'?'on':''}" onclick="setAnaMode('rhythm')">リズム</button>
  </div>` + anaNavHtml(today);

  if(anaMode==="day"){
    const totals = totalsOfDay(anaDate);
    const sum = Object.values(totals).reduce((a,b)=>a+b,0);
    const recorded = sum, elapsed = anaDate===today ? Date.now()-today : 86400000;
    html += `<div class="kpi-grid">
      <div class="kpi"><div class="k-lbl">記録済み時間</div><div class="k-val">${fmtDur(recorded)||"0分"}</div></div>
      <div class="kpi"><div class="k-lbl">記録カバー率</div><div class="k-val">${elapsed?Math.round(recorded/elapsed*100):0}%</div></div>
    </div>` + healthKpisHtml([anaDate]);
    html += `<div class="card">` + breakdownRows(totals, sum) + `</div>`;
  }else if(anaMode==="week"){
    const days = anaDays(7);
    const perDay = days.map(d=>totalsOfDay(d));
    const weekTotal = {};
    perDay.forEach(t=>{ for(const k in t) weekTotal[k]=(weekTotal[k]||0)+t[k]; });
    const wSum = Object.values(weekTotal).reduce((a,b)=>a+b,0);
    const maxDay = Math.max(...perDay.map(t=>Object.values(t).reduce((a,b)=>a+b,0)), 1);

    html += `<div class="kpi-grid">
      <div class="kpi"><div class="k-lbl">7日合計</div><div class="k-val">${fmtDur(wSum)||"0分"}</div></div>
      <div class="kpi"><div class="k-lbl">1日平均</div><div class="k-val">${fmtDur(wSum/7)||"0分"}</div></div>
    </div>` + healthKpisHtml(days);

    // 積み上げ棒
    html += `<div class="card"><div class="sec-label" style="margin-top:0">日別の内訳</div><div class="week-chart">` +
      days.map((d,i)=>{
        const t=perDay[i], dSum=Object.values(t).reduce((a,b)=>a+b,0);
        const stack = state.categories.filter(c=>t[c.id]).map(c=>
          `<div style="height:${t[c.id]/maxDay*140}px;background:${c.color}"></div>`).join("");
        return `<div class="wc-col"><div class="wc-stack">${stack}</div><div class="wc-lbl">${new Date(d).getDate()}<br><span style="font-size:9px">${dSum?fmtDurShort(dSum):""}</span></div></div>`;
      }).join("") + `</div></div>`;
    html += waterWeekChart(days);
    html += alcoholWeekChart(days);

    html += `<div class="card">` + breakdownRows(weekTotal, wSum) + `</div>`;
  }else{
    html += renderRhythm(anaDate);
  }
  m.innerHTML = html;
}

function breakdownRows(totals, sum){

function renderRhythm(today){
  const days=[]; for(let i=13;i>=0;i--) days.push(today - i*86400000);
  const recordedDays = days.filter(d=>entriesOfDay(d).length).length;
  if(recordedDays < 3){
    return `<div class="empty">あと${3-recordedDays}日記録するとリズムが表示されます</div>`;
  }
  return `
    <div class="card"><div class="chart-title">就寝・起床時刻の推移</div>${sleepRhythmSvg(days)}</div>
    <div class="card"><div class="chart-title">主要カテゴリの日別時間</div>${majorCategorySvg(days)}</div>
    <div class="card"><div class="chart-title">カフェイン最終摂取時刻 × 就寝時刻</div>${caffeineSleepSvg(days)}</div>
    <div class="card"><div class="chart-title">前日睡眠時間 × 当日の気分平均</div>${moodSleepScatter(days)}</div>
    <div class="card"><div class="chart-title">体重トレンド(直近30日)</div>${weightTrendSvg(today)}</div>
    <div class="card"><div class="chart-title">曜日別の平均内訳</div>${weekdayAverageBars(days)}</div>
  `;
}
function sleepSessions(days){
  const sleepId = settingCatId("sleepCatId");
  if(!sleepId) return [];
  const first = days[0], last = days[days.length-1] + 86400000;
  const byWakeDay = new Map();
  state.entries
    .filter(e=>e.cat===sleepId && e.end!==null && e.end>=first && e.end<last)
    .forEach(e=>{
      const d = dayStart(e.end);
      if(!byWakeDay.has(d) || e.end > byWakeDay.get(d).end) byWakeDay.set(d, e);
    });
  return days.map(d=>byWakeDay.get(d) || null);
}
function rhythmHour(t, wakeDay){
  const h = new Date(t).getHours() + new Date(t).getMinutes()/60;
  const d = dayStart(t);
  if(d < wakeDay) return h;
  return h < 18 ? h + 24 : h;
}
function sleepRhythmSvg(days){
  const sessions = sleepSessions(days);
  const W=360,H=220,L=42,R=12,T=16,B=28, pw=W-L-R, ph=H-T-B;
  const x = i => L + (days.length===1 ? pw/2 : i/(days.length-1)*pw);
  const y = v => T + (v-18)/18*ph;
  const bed = [], wake = [];
  sessions.forEach((e,i)=>{
    if(!e) return;
    bed.push([x(i), y(rhythmHour(e.start, days[i]))]);
    wake.push([x(i), y(rhythmHour(e.end, days[i]))]);
  });
  const grid = [18,24,30,36].map(v=>`<line class="svg-grid" x1="${L}" y1="${y(v)}" x2="${W-R}" y2="${y(v)}"></line><text class="svg-label" x="4" y="${y(v)+3}">${v===24?"0":v===30?"6":v===36?"12":v}</text>`).join("");
  const labels = days.map((d,i)=>i%2===0?`<text class="svg-label" x="${x(i)-5}" y="${H-8}">${new Date(d).getDate()}</text>`:"").join("");
  return `<svg class="rhythm-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="就寝と起床の推移">
    ${grid}<line class="svg-axis" x1="${L}" y1="${T}" x2="${L}" y2="${H-B}"></line><line class="svg-axis" x1="${L}" y1="${H-B}" x2="${W-R}" y2="${H-B}"></line>
    ${polyline(bed, "#7C8DB5")}${polyline(wake, "#D9A441")}
    ${points(bed, "#7C8DB5")}${points(wake, "#D9A441")}${labels}
  </svg><div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#7C8DB5"></span>就寝</span><span class="legend-item"><span class="legend-dot" style="background:#D9A441"></span>起床</span></div>`;
}
function majorCategorySvg(days){
  const sleepId = settingCatId("sleepCatId");
  const perDay = days.map(d=>totalsOfDay(d));
  const totals = {};
  perDay.forEach(t=>{ for(const k in t) if(k!==sleepId) totals[k]=(totals[k]||0)+t[k]; });
  const cats = state.categories.filter(c=>totals[c.id]).sort((a,b)=>totals[b.id]-totals[a.id]).slice(0,3);
  if(!cats.length) return `<div class="empty">睡眠以外の記録がまだありません</div>`;
  const W=360,H=210,L=34,R=12,T=14,B=30, pw=W-L-R, ph=H-T-B;
  const max = Math.max(...cats.flatMap(c=>perDay.map(t=>(t[c.id]||0)/60000)), 60);
  const x = i => L + (days.length===1 ? pw/2 : i/(days.length-1)*pw);
  const y = v => T + (1 - v/max)*ph;
  const grid = [0,.5,1].map(r=>`<line class="svg-grid" x1="${L}" y1="${T+ph*r}" x2="${W-R}" y2="${T+ph*r}"></line>`).join("");
  const labels = days.map((d,i)=>i%2===0?`<text class="svg-label" x="${x(i)-5}" y="${H-8}">${new Date(d).getDate()}</text>`:"").join("");
  const lines = cats.map(c=>{
    const pts = perDay.map((t,i)=>[x(i), y((t[c.id]||0)/60000)]);
    return polyline(pts, c.color) + points(pts, c.color);
  }).join("");
  return `<svg class="rhythm-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="主要カテゴリの日別時間">
    ${grid}<text class="svg-label" x="3" y="${T+4}">${Math.round(max/60)}h</text><text class="svg-label" x="8" y="${H-B+3}">0</text>
    <line class="svg-axis" x1="${L}" y1="${T}" x2="${L}" y2="${H-B}"></line><line class="svg-axis" x1="${L}" y1="${H-B}" x2="${W-R}" y2="${H-B}"></line>
    ${lines}${labels}
  </svg><div class="legend">${cats.map(c=>`<span class="legend-item"><span class="legend-dot" style="background:${c.color}"></span>${esc(c.name)}</span>`).join("")}</div>`;
}
function timeAxisHour(t, anchorDay){
  const d = new Date(t);
  const h = d.getHours() + d.getMinutes()/60;
  return dayStart(t) < anchorDay ? h : h < 12 ? h + 24 : h;
}
function lastCaffeineBeforeBed(session){
  if(!session) return null;
  const startDay = dayStart(session.start);
  return logsOfDay(startDay)
    .filter(l=>l.type==="caffeine" && l.time<=session.start)
    .sort((a,b)=>b.time-a.time)[0] || null;
}
function caffeineSleepSvg(days){
  const sessions = sleepSessions(days);
  const W=360,H=220,L=42,R=12,T=16,B=28, pw=W-L-R, ph=H-T-B;
  const x = i => L + (days.length===1 ? pw/2 : i/(days.length-1)*pw);
  const y = v => T + (v-12)/24*ph;
  const bed=[], caf=[];
  sessions.forEach((e,i)=>{
    if(e) bed.push([x(i), y(timeAxisHour(e.start, days[i]))]);
    const c = lastCaffeineBeforeBed(e);
    if(c) caf.push([x(i), y(timeAxisHour(c.time, days[i]))]);
  });
  if(!bed.length && !caf.length) return `<div class="empty">睡眠とカフェインの記録がまだありません</div>`;
  const grid = [12,18,24,30,36].map(v=>`<line class="svg-grid" x1="${L}" y1="${y(v)}" x2="${W-R}" y2="${y(v)}"></line><text class="svg-label" x="4" y="${y(v)+3}">${v===24?"0":v===30?"6":v===36?"12":v}</text>`).join("");
  const labels = days.map((d,i)=>i%2===0?`<text class="svg-label" x="${x(i)-5}" y="${H-8}">${new Date(d).getDate()}</text>`:"").join("");
  return `<svg class="rhythm-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="カフェイン最終摂取時刻と就寝時刻">
    ${grid}<line class="svg-axis" x1="${L}" y1="${T}" x2="${L}" y2="${H-B}"></line><line class="svg-axis" x1="${L}" y1="${H-B}" x2="${W-R}" y2="${H-B}"></line>
    ${polyline(caf, "#5B9E8F")}${points(caf, "#5B9E8F")}${polyline(bed, "#7C8DB5")}${points(bed, "#7C8DB5")}${labels}
  </svg><div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B9E8F"></span>カフェイン最終</span><span class="legend-item"><span class="legend-dot" style="background:#7C8DB5"></span>就寝</span></div>`;
}
function moodAverageOfDay(day){
  const vals = logsOfDay(day).filter(l=>l.type==="mood").map(l=>Number(l.value || 0)).filter(Boolean);
  return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
}
function sleepMinutesForWakeDay(day){
  const s = sleepSessions([day])[0];
  return s ? (s.end - s.start) / 60000 : null;
}
function moodSleepScatter(days){
  const ptsData = days.map(d=>{
    const mood = moodAverageOfDay(d);
    const sleep = sleepMinutesForWakeDay(d - 86400000);
    return mood && sleep ? {mood, sleep} : null;
  }).filter(Boolean);
  if(ptsData.length < 5) return `<div class="empty">気分と睡眠を${5-ptsData.length}日分記録すると相関が表示されます</div>`;
  const W=360,H=220,L=42,R=16,T=16,B=32, pw=W-L-R, ph=H-T-B;
  const minSleep = Math.min(...ptsData.map(p=>p.sleep), 240);
  const maxSleep = Math.max(...ptsData.map(p=>p.sleep), 600);
  const x = v => L + (v-minSleep)/Math.max(maxSleep-minSleep,1)*pw;
  const y = v => T + (5-v)/4*ph;
  const dots = ptsData.map(p=>`<circle cx="${x(p.sleep)}" cy="${y(p.mood)}" r="4" fill="#8B7BB5" opacity=".85"></circle>`).join("");
  return `<svg class="rhythm-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="前日睡眠時間と当日の気分平均">
    ${[1,3,5].map(v=>`<line class="svg-grid" x1="${L}" y1="${y(v)}" x2="${W-R}" y2="${y(v)}"></line><text class="svg-label" x="8" y="${y(v)+3}">${v}</text>`).join("")}
    <line class="svg-axis" x1="${L}" y1="${T}" x2="${L}" y2="${H-B}"></line><line class="svg-axis" x1="${L}" y1="${H-B}" x2="${W-R}" y2="${H-B}"></line>
    <text class="svg-label" x="${L}" y="${H-8}">${fmtDur(minSleep*60000)}</text><text class="svg-label" x="${W-58}" y="${H-8}">${fmtDur(maxSleep*60000)}</text>${dots}
  </svg>`;
}
function weightTrendSvg(today){
  const start = today - 29*86400000, end = today + 86400000;
  const byDay = new Map();
  state.logs.filter(l=>l.type==="weight" && l.time>=start && l.time<end).forEach(l=>byDay.set(dayStart(l.time), l));
  const days=[]; for(let d=start; d<end; d+=86400000) days.push(d);
  const values = days.map((d,i)=>byDay.has(d) ? {i, day:d, value:Number(byDay.get(d).value)} : null).filter(Boolean);
  if(!values.length) return `<div class="empty">体重の記録がまだありません</div>`;
  const W=360,H=210,L=38,R=12,T=16,B=28, pw=W-L-R, ph=H-T-B;
  const min = Math.min(...values.map(p=>p.value)), max = Math.max(...values.map(p=>p.value));
  const pad = Math.max((max-min)*.12, .5);
  const lo = min - pad, hi = max + pad;
  const x = i => L + i/29*pw;
  const y = v => T + (1 - (v-lo)/Math.max(hi-lo,.1))*ph;
  const pts = values.map(p=>[x(p.i), y(p.value)]);
  const labels = days.map((d,i)=>i%5===0?`<text class="svg-label" x="${x(i)-5}" y="${H-8}">${new Date(d).getDate()}</text>`:"").join("");
  return `<svg class="rhythm-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="体重トレンド">
    <line class="svg-grid" x1="${L}" y1="${y(hi-pad)}" x2="${W-R}" y2="${y(hi-pad)}"></line><text class="svg-label" x="2" y="${y(hi-pad)+3}">${(hi-pad).toFixed(1)}</text>
    <line class="svg-grid" x1="${L}" y1="${y(lo+pad)}" x2="${W-R}" y2="${y(lo+pad)}"></line><text class="svg-label" x="2" y="${y(lo+pad)+3}">${(lo+pad).toFixed(1)}</text>
    <line class="svg-axis" x1="${L}" y1="${T}" x2="${L}" y2="${H-B}"></line><line class="svg-axis" x1="${L}" y1="${H-B}" x2="${W-R}" y2="${H-B}"></line>
    ${polyline(pts, "#6FA8C9")}${points(pts, "#6FA8C9")}${labels}
  </svg>`;
}
function weekdayAverageBars(days){
  const names = ["日","月","火","水","木","金","土"];
  const counts = Array(7).fill(0), totals = Array.from({length:7},()=>({}));
  days.forEach(d=>{
    const wd = new Date(d).getDay();
    counts[wd]++;
    const t = totalsOfDay(d);
    for(const k in t) totals[wd][k] = (totals[wd][k] || 0) + t[k];
  });
  const rows = totals.map((t,wd)=>{
    const avg = {};
    for(const k in t) avg[k] = t[k] / counts[wd];
    return avg;
  });
  const max = Math.max(...rows.map(t=>Object.values(t).reduce((a,b)=>a+b,0)), 1);
  return rows.map((t,wd)=>{
    const sum = Object.values(t).reduce((a,b)=>a+b,0);
    const segs = state.categories.filter(c=>t[c.id]).map(c=>
      `<span class="stack-seg" title="${esc(c.name)} ${fmtDur(t[c.id])}" style="width:${t[c.id]/max*100}%;background:${c.color}"></span>`).join("");
    return `<div class="stack-row"><div class="stack-name">${names[wd]}</div><div class="stack-bar">${segs}</div><div class="stack-total">${sum?fmtDurShort(sum):""}</div></div>`;
  }).join("") + `<div class="legend">${state.categories.filter(c=>rows.some(t=>t[c.id])).map(c=>`<span class="legend-item"><span class="legend-dot" style="background:${c.color}"></span>${esc(c.name)}</span>`).join("")}</div>`;
}
function polyline(pts, color){
  return pts.length ? `<polyline points="${pts.map(p=>p.join(",")).join(" ")}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></polyline>` : "";
}
function points(pts, color){
  return pts.map(([px,py])=>`<circle cx="${px}" cy="${py}" r="3.2" fill="${color}" stroke="#fff" stroke-width="1.5"></circle>`).join("");
}

    <button class="btn danger" onclick="clearAll()">全データを削除</button>
    <p style="font-size:11.5px;color:var(--sub);margin-top:14px">
      記録件数: ${state.entries.length} 件。健康記録: ${state.logs.length} 件。データはこの端末のブラウザ内ストレージに保存されます。
    </p>`;
}
function summarySelect(key){
  const current = settingCatId(key);
  return `<select class="set-select" onchange="setSummaryCat('${key}', this.value)">
    <option value="" ${current===null?"selected":""}>指定しない</option>
    ${state.categories.map(c=>`<option value="${c.id}" ${c.id===current?"selected":""}>${c.emoji} ${esc(c.name)}</option>`).join("")}
  </select>`;
}
function setSummaryCat(key, value){
  state.settings[key] = value || null;
  save(); render(); toast("設定を保存しました");
}
function saveGoogleClientId(value){
  state.settings.googleClientId = value.trim();
  save();
}
function openCatEdit(id){
  const c = id ? cat(id) : {id:null, name:"", emoji:"⭐", color:PALETTE[state.categories.length % PALETTE.length]};
  const colors = PALETTE.map(p=>`<button class="cbtn ${p===c.color?'on':''}" style="background:${p}" onclick="pickColor(this,'${p}')"></button>`).join("");
  showModal(`
    <h3>${id?"カテゴリを編集":"カテゴリを追加"}</h3>
    <div class="fld-row">
      <div class="fld" style="flex:0 0 80px"><label>絵文字</label><input id="ceEmoji" value="${c.emoji}" maxlength="4" style="text-align:center;font-size:20px"></div>
      <div class="fld"><label>名前</label><input id="ceName" value="${esc(c.name)}" placeholder="例: 副業"></div>
    </div>
    <div class="fld"><label>色</label><div class="color-row" id="ceColors" data-color="${c.color}">${colors}</div></div>
    <div class="modal-acts">
      <button class="btn ghost" style="flex:1" onclick="closeModal()">キャンセル</button>
      <button class="btn" style="flex:2" onclick="saveCat(${id?`'${id}'`:"null"})">保存</button>
    </div>
  `);
}
function pickColor(el, color){
  document.querySelectorAll("#ceColors .cbtn").forEach(b=>b.classList.remove("on"));
  el.classList.add("on");
  document.getElementById("ceColors").dataset.color = color;
}
function saveCat(id){
  const name = document.getElementById("ceName").value.trim();
  const emoji = document.getElementById("ceEmoji").value.trim() || "⭐";
  const color = document.getElementById("ceColors").dataset.color;
  if(!name){ toast("名前を入力してください"); return; }
  if(id){ const c=cat(id); c.name=name; c.emoji=emoji; c.color=color; }
  else state.categories.push({id:uid(), name, emoji, color});
  save(); closeModal(); render();
}
function removeCat(id){
  const used = state.entries.some(e=>e.cat===id);
  if(!confirm(cat(id).name + " を削除しますか?" + (used?"\n(過去の記録は「不明」表示になります)":""))) return;
  state.categories = state.categories.filter(c=>c.id!==id);
  if(settingCatId("sleepCatId")===id) state.settings.sleepCatId = null;
  if(settingCatId("restCatId")===id) state.settings.restCatId = null;
  save(); render();
}
function openExportSheet(kind){
  showModal(`
    <h3>エクスポート内容を選択</h3>
    <label class="set-item" style="cursor:pointer"><input id="exActivity" type="checkbox" checked style="width:20px;height:20px"> <span class="sn">行動記録を含める</span></label>
    <label class="set-item" style="cursor:pointer"><input id="exHealth" type="checkbox" checked style="width:20px;height:20px"> <span class="sn">健康記録を含める</span></label>
    <div class="modal-acts">
      <button class="btn ghost" style="flex:1" onclick="closeModal()">キャンセル</button>
      <button class="btn" style="flex:2" onclick="runExport('${kind}')">エクスポート</button>
    </div>
  `);
}
function exportSuffix(opts){
  if(opts.activity && opts.health) return "";
  if(opts.activity) return "-activity-only";
  if(opts.health) return "-health-only";
  return "-empty";
}
function exportState(opts){
  const out = {
    categories: cloneData(state.categories),
    entries: opts.activity ? cloneData(state.entries) : [],
    logs: opts.health ? cloneData(state.logs) : [],
    settings: cloneData(state.settings || {})
  };
  return out;
}
function runExport(kind){
  const opts = {
    activity: document.getElementById("exActivity").checked,
    health: document.getElementById("exHealth").checked
  };
  if(!opts.activity && !opts.health){ toast("出力内容を選択してください"); return; }
  closeModal();
  if(kind==="json") exportJson(opts);
  else if(kind==="csv") exportCsv(opts);
  else exportXlsx(opts);
}
function exportJson(opts={activity:true,health:true}){
  const suffix = exportSuffix(opts);
  downloadBlob(JSON.stringify(exportState(opts),null,2), "otona-log-" + fmtYMD(Date.now()) + suffix + ".json", "application/json");
}
const EXPORT_HEADERS = ["日付","カテゴリ名","開始(HH:MM)","終了(HH:MM)","時間(分)","進行中フラグ","メモ"];
const HEALTH_EXPORT_HEADERS = ["日付","時刻","種別","値","単位","メモ"];
function exportRows(entries=state.entries){
  const now = Date.now();
  const rows = [];
  for(const e of entries){
    const realEnd = e.end===null ? now : e.end;
    for(let day=dayStart(e.start); day<=dayStart(realEnd); day+=86400000){
      const c = clipToDay({start:e.start,end:realEnd}, day);
      if(!c) continue;
      const [s,x] = c;
      rows.push({
        date:fmtYMD(day),
        catId:e.cat,
        catName:cat(e.cat).name,
        start:fmtHM(s),
        end:e.end===null && x===realEnd ? "" : fmtHM(x),
        minutes:Math.round((x-s)/60000),
        ongoing:e.end===null ? "TRUE" : "FALSE",
        note:e.note || ""
      });
    }
  }
  return rows.sort((a,b)=>a.date.localeCompare(b.date) || a.start.localeCompare(b.start));
}
function exportHealthRows(logs=state.logs){
  return logs.slice().sort((a,b)=>a.time-b.time).map(l=>({
    date:fmtYMD(l.time),
    time:fmtHM(l.time),
    type:healthName(l.type),
    value:"value" in l ? Number(l.value || 0) : "",
    unit:healthUnit(l.type),
    note:l.note || ""
  }));
}
function csvCell(v){
  const s = String(v ?? "");
  return /[",\r\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
}
function exportCsv(opts={activity:true,health:true}){
  const suffix = exportSuffix(opts);
  if(opts.activity){
    const lines = [EXPORT_HEADERS, ...exportRows().map(r=>[r.date,r.catName,r.start,r.end,r.minutes,r.ongoing,r.note])]
      .map(row=>row.map(csvCell).join(","));
    downloadBlob("\uFEFF" + lines.join("\r\n"), "otona-log-" + fmtYMD(Date.now()) + suffix + ".csv", "text/csv;charset=utf-8");
  }
  if(opts.health){
    const lines = [HEALTH_EXPORT_HEADERS, ...exportHealthRows().map(r=>[r.date,r.time,r.type,r.value,r.unit,r.note])]
      .map(row=>row.map(csvCell).join(","));
    downloadBlob("\uFEFF" + lines.join("\r\n"), "otona-log-health-" + fmtYMD(Date.now()) + suffix + ".csv", "text/csv;charset=utf-8");
  }
}
function exportXlsx(opts={activity:true,health:true}){
  if(!window.XLSX?.utils){
    toast("オフラインのためExcel出力できません。CSVをご利用ください");
    return;
  }
  const wb = XLSX.utils.book_new();
  if(opts.activity){
    const rows = exportRows();
    const listData = [EXPORT_HEADERS, ...rows.map(r=>[r.date,r.catName,r.start,r.end,r.minutes,r.ongoing,r.note])];
    const summary = dailySummary(rows);
    const listWs = XLSX.utils.aoa_to_sheet(listData);
    listWs["!cols"] = fitCols(listData);
    XLSX.utils.book_append_sheet(wb, listWs, "記録一覧");

    const sumWs = XLSX.utils.aoa_to_sheet(summary);
    sumWs["!cols"] = fitCols(summary);
    XLSX.utils.book_append_sheet(wb, sumWs, "日別集計");
  }
  if(opts.health){
    const healthData = [HEALTH_EXPORT_HEADERS, ...exportHealthRows().map(r=>[r.date,r.time,r.type,r.value,r.unit,r.note])];
    const healthWs = XLSX.utils.aoa_to_sheet(healthData);
    healthWs["!cols"] = fitCols(healthData);
    XLSX.utils.book_append_sheet(wb, healthWs, "健康記録");
  }
  XLSX.writeFile(wb, "otona-log-" + fmtYMD(Date.now()) + exportSuffix(opts) + ".xlsx");
}
function dailySummary(rows){
  const names = [];
  const seen = new Set();
  state.categories.forEach(c=>{
    if(rows.some(r=>r.catId===c.id) && !seen.has(c.name)){ seen.add(c.name); names.push(c.name); }
  });
  rows.forEach(r=>{ if(!seen.has(r.catName)){ seen.add(r.catName); names.push(r.catName); } });
  const byDay = new Map();
  rows.forEach(r=>{
    if(!byDay.has(r.date)) byDay.set(r.date, Object.fromEntries(names.map(n=>[n,0])));
    const day = byDay.get(r.date);
    day[r.catName] = (day[r.catName] || 0) + r.minutes;
  });
  return [["日付", ...names], ...[...byDay.keys()].sort().map(d=>[d, ...names.map(n=>byDay.get(d)[n] || 0)])];
}
function fitCols(data){
  if(!data.length) return [];
  return data[0].map((_,i)=>{
    const max = data.reduce((m,row)=>Math.max(m, String(row[i] ?? "").length), 0);
    return {wch:Math.min(Math.max(max + 2, 8), 32)};
  });
}
function downloadBlob(content, filename, type){
  const blob = new Blob([content],{type});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.style.display = "none";
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{
    URL.revokeObjectURL(a.href);
    a.remove();
  }, 1000);
}
function importJsonFile(input){
  const file = input.files?.[0];
  input.value = "";
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(String(reader.result || ""));
      if(!data || !Array.isArray(data.categories) || !Array.isArray(data.entries)){
        toast("JSONの形式が不正です");
        return;
      }
      state = normalizeState(data);
      save(); render(); toast("JSONをインポートしました");
    }catch(e){
      toast("JSONを読み込めませんでした");
    }
  };
  reader.readAsText(file);
}
function clearAll(){
  if(!confirm("全ての記録とカテゴリ設定を削除します。よろしいですか?")) return;
  state = { categories: cloneData(DEFAULT_CATS), entries: [], logs: [], settings: {...DEFAULT_SETTINGS} };
  googleToken = null; googleTokenExpiresAt = 0; googleTokenClient = null; calendarEvents = []; calendarRange = null;
  save(); render(); toast("初期化しました");
}

/* ---- modal / toast ---- */
function showModal(html){
  closeModal();
  const bg = document.createElement("div");
  bg.className="modal-bg"; bg.id="modalBg";
  bg.innerHTML = `<div class="modal">${html}</div>`;
  bg.addEventListener("click", e=>{ if(e.target===bg) closeModal(); });
  document.body.appendChild(bg);
  bg.querySelectorAll("input,select").forEach(el=>{
    el.addEventListener("focus", ()=>setTimeout(()=>{
      el.scrollIntoView({block:"center", behavior:"smooth"});
    }, 120));
  });
}
function closeModal(){ document.getElementById("modalBg")?.remove(); }
let toastTimer=null;
let toastAction = null;
function toast(msg, actionLabel=null, actionFn=null){
  const t=document.getElementById("toast");
  toastAction = actionFn;
  t.classList.toggle("has-action", Boolean(actionLabel && actionFn));
  t.innerHTML = `<span>${esc(msg)}</span>` + (actionLabel && actionFn ? `<button onclick="runToastAction()">${esc(actionLabel)}</button>` : "");
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{
    t.classList.remove("show","has-action");
    toastAction = null;
  }, actionLabel ? 3200 : 1800);
}
function runToastAction(){
  const fn = toastAction;
  document.getElementById("toast").classList.remove("show");
  toastAction = null;
  if(fn) fn();
}

/* ---- boot ---- */
(async ()=>{
  await load();
  render();
  if(firebaseConfigured()) initCloud({silent:true});
})();
window.addEventListener("pagehide", flushSave);
document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="hidden") flushSave(); });
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
